<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/ceresense favicon.png" />
    <link rel="apple-touch-icon" href="/ceresense favicon.png">
    
    <!-- SEO Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CERESENSE transforms aspiring individuals into industry-ready tech professionals through cutting-edge curriculum and hands-on training.">
    <meta name="keywords" content="tech education, coding bootcamp, programming courses, tech training, software development, web development, data science, Nigeria tech education, career transformation">
    <meta name="author" content="CERESENSE">
    
    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:title" content="CERESENSE - Tech Education & Career Transformation">
    <meta property="og:description" content="Transform your career with industry-ready tech skills. Learn from experts and launch your tech career today.">
    <meta property="og:image" content="/ceresense-og-image.png">
    <meta property="og:url" content="https://ceresense.com.ng">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="CERESENSE">
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CERESENSE - Tech Education & Career Transformation">
    <meta name="twitter:description" content="Transform your career with industry-ready tech skills. Learn from experts and launch your tech career today.">
    <meta name="twitter:image" content="/ceresense-twitter-card.png">
    <meta name="twitter:site" content="@ceresense">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#3b82f6">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://ceresense.com.ng">
    
    <!-- Title -->
    <title>CERESENSE - Tech Education & Career Transformation Platform</title>
    
    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "EducationalOrganization",
      "name": "CERESENSE",
      "description": "CERESENSE transforms aspiring individuals into industry-ready tech professionals through cutting-edge curriculum and hands-on training.",
      "url": "https://ceresense.com.ng",
      "logo": "https://ceresense.com.ng/ceresense favicon.png",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "Nigeria"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "telephone": "+2347063419718",
        "email": "admin@ceresense.com.ng"
      },
      "sameAs": [
        "https://facebook.com/ceresense",
        "https://twitter.com/ceresense",
        "https://instagram.com/ceresense",
        "https://linkedin.com/company/ceresense"
      ]
    }
    </script>
    
    <!-- Additional SEO -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
    <meta name="googlebot" content="index, follow">
    <link rel="sitemap" type="application/xml" href="/sitemap.xml">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Schema.org for BreadcrumbList -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "https://ceresense.com.ng"
        }
      ]
    }
    </script>
  </body>
</html>
